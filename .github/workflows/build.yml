name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# A new push supersedes the previous build; don't let ~15-min runs stack up.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker image prune -a -f

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Create local.properties
        run: |
          cat << 'EOF' > local.properties
          app.id=org.moregramx.mgx
          app.name=moregramX
          app.download_url=https://telegram.org/dlx
          telegram.api_id=23793598
          telegram.api_hash=273a536b9232da26405a3faa74c418f2
          youtube.api_key=
          tgx.extension=none
          app.experimental=false
          EOF
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Run Project Setup Script
        env:
          TERM: xterm
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Signing Keystore
        if: github.event_name == 'push'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          if [ -n "$KEYSTORE_B64" ] && [ -n "$STORE_PASS" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            echo "KEYSTORE_PATH=$PWD/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASS=$STORE_PASS" >> $GITHUB_ENV
            echo "KEY_ALIAS=mgx" >> $GITHUB_ENV
            echo "org.gradle.jvmargs=-Xmx3g -XX:+UseG1GC" >> gradle.properties
            echo "RELEASE_STORE_FILE=$PWD/release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=mgx" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=$STORE_PASS" >> gradle.properties
            echo "::notice:: Release signing enabled"
          else
            echo "::warning:: KEYSTORE_B64 or KEYSTORE_PASS secret not set, skipping release signing"
          fi

      - name: Build with Gradle
        run: |
          ./gradlew :app:assembleLatestArm64Debug --stacktrace --no-daemon --max-workers=2 -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-x-debug-artifacts
          path: app/build/outputs/apk/**/*.apk

      - name: Delete old pre-release
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          # Wait a moment for GitHub to process the deletion
          sleep 3

      - name: Upload APK to Latest Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: latest
          name: "Latest Debug Build"
          body: "此為自動編譯產出的最新測試版 APK，點擊下方檔案即可直接下載安裝。"
          prerelease: true
          make_latest: true
          files: app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
